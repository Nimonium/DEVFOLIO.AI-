kind = "web"
previewPath = "/"
title = "DevFolio AI"
version = "1.0.0"
id = "artifacts/devfolio-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24602

[services.development]
run = "pnpm --filter @workspace/devfolio-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/devfolio-ai", "run", "build" ]
publicDir = "artifacts/devfolio-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24602"
BASE_PATH = "/"
